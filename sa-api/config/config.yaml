app:
  name: SmartAttendance
  port: "8080"
  env: development       # development | production
  debug: true
  version: "1.0.0"

database:
  host: localhost
  port: "5432"
  name: smart_attendance
  user: postgres
  password: postgres
  ssl_mode: disable
  max_open_conns: 25     # Tối ưu cho 5000 concurrent users
  max_idle_conns: 10
  conn_max_lifetime: 300 # seconds

redis:
  host: localhost
  port: "6379"
  password: ""
  db: 0
  pool_size: 10

jwt:
  secret: "secret"
  expire_hours: 24
  refresh_expire_days: 7

correction:
  max_per_month: 4            # Hạn mức bù công ca chính thức tối đa mỗi tháng (tính theo credit)
  overtime_max_per_month: 4   # Hạn mức bù công tăng ca tối đa mỗi tháng

attendance:
  max_suspicious_count: 3     # Số lần vi phạm tối đa trong N ngày trước khi block check-in
  suspicious_window_days: 7   # Số ngày kiểm tra lịch sử vi phạm

overtime:
  max_hours_per_day: 4        # Số giờ OT tối đa mỗi ngày
