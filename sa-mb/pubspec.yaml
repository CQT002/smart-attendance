name: smart_attendance
description: HDBBank Smart Attendance - Employee Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Networking
  dio: ^5.4.0

  # Location & WiFi
  geolocator: ^11.0.0
  network_info_plus: ^5.0.0

  # Device Info & Security
  device_info_plus: ^10.1.0
  flutter_secure_storage: ^9.0.0
  package_info_plus: ^6.0.0

  # Push Notifications
  firebase_core: ^2.27.0
  firebase_messaging: ^14.7.0
  flutter_local_notifications: ^17.0.0

  # UI
  google_fonts: ^6.1.0
  intl: ^0.19.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.9

  # Utilities
  shared_preferences: ^2.2.2
  connectivity_plus: ^6.0.1
  permission_handler: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
